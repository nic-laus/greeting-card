<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Good Luck Today</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@500;700&family=Quicksand:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --sky-top:#3d2f52;
    --sky-bot:#f2b6c6;
    --sun:#ffd9a0;
    --card:#fff8f0;
    --ink:#2b2140;
    --petal:#ff9eb0;
    --petal-2:#ffc17a;
    --leaf:#8fae7f;
  }
  *{box-sizing:border-box;}
  html,body{
    margin:0; height:100%;
    font-family:'Quicksand',sans-serif;
    overflow:hidden;
    background:linear-gradient(180deg, var(--sky-top) 0%, var(--sky-bot) 65%, #ffe3d0 100%);
  }
  .stage{
    position:relative;
    width:100%; height:100vh;
    display:flex; align-items:center; justify-content:center;
    padding:24px;
  }
  .sun{
    position:absolute;
    top:8%; left:50%; transform:translateX(-50%);
    width:170px; height:170px;
    border-radius:50%;
    background:radial-gradient(circle at 35% 35%, #fff3d6, var(--sun) 70%);
    box-shadow:0 0 60px 20px rgba(255,217,160,0.35);
    opacity:.9;
  }
  .card{
    position:relative;
    z-index:3;
    background:var(--card);
    border-radius:28px;
    padding:36px 28px 28px;
    width:100%;
    max-width:360px;
    text-align:center;
    box-shadow:0 20px 50px rgba(43,33,64,0.35);
  }
  .cat-wrap{
    width:270px; height:170px;
    margin:0 auto 8px;
    position:relative;
    cursor:pointer;
    -webkit-tap-highlight-color: transparent;
  }
  .cat-wrap svg{
    display:block;
    transform-origin:center;
  }
  .cat-wrap.celebrate svg{
    animation: bounce .6s ease;
  }
  @keyframes bounce{
    0%{ transform:scale(1) rotate(0deg); }
    30%{ transform:scale(1.14) rotate(-4deg); }
    55%{ transform:scale(0.94) rotate(3deg); }
    75%{ transform:scale(1.05) rotate(-1deg); }
    100%{ transform:scale(1) rotate(0deg); }
  }
  .cat-wrap.celebrate .paw{
    animation: toss .5s ease-in-out 2;
  }
  .greeting{
    font-family:'Caveat',cursive;
    font-weight:700;
    font-size:2.6rem;
    color:var(--ink);
    margin:6px 0 2px;
    line-height:1.05;
  }
  .sub{
    font-size:0.95rem;
    color:#7a6d8f;
    margin:0 0 4px;
    font-weight:500;
    letter-spacing:.02em;
  }
  .signoff{
    margin-top:14px;
    font-family:'Caveat',cursive;
    font-size:1.3rem;
    color:#b9587a;
  }

  /* petals */
  .petals{
    position:absolute; inset:0;
    pointer-events:none;
    z-index:2;
    overflow:hidden;
  }
  .petal{
    position:absolute;
    top:-40px;
    border-radius:50% 0 50% 0;
    opacity:.9;
    animation-name:drift;
    animation-timing-function:linear;
    animation-iteration-count:infinite;
  }
  @keyframes drift{
    0%{ transform:translateY(-10vh) translateX(0) rotate(0deg); opacity:0; }
    10%{ opacity:.95; }
    90%{ opacity:.9; }
    100%{ transform:translateY(110vh) translateX(var(--drift, 40px)) rotate(340deg); opacity:0; }
  }

  /* cat paw toss */
  .paw{
    transform-origin: 78% 68%;
    animation: toss 2.4s ease-in-out infinite;
  }
  @keyframes toss{
    0%,100%{ transform: rotate(0deg); }
    30%{ transform: rotate(-26deg); }
    50%{ transform: rotate(4deg); }
  }
  .tail{
    transform-origin: 20% 85%;
    animation: sway 3.2s ease-in-out infinite;
  }
  @keyframes sway{
    0%,100%{ transform: rotate(0deg); }
    50%{ transform: rotate(8deg); }
  }
  .blossom{
    animation: pop 2.4s ease-in-out infinite;
    transform-origin: center;
  }
  @keyframes pop{
    0%,60%,100%{ transform: scale(0); opacity:0; }
    75%{ transform: scale(1.15); opacity:1; }
    90%{ transform: scale(1); opacity:1; }
  }
  .heart{
    animation: floatheart 2.6s ease-in-out infinite;
    transform-origin: center;
  }
  @keyframes floatheart{
    0%,100%{ transform: translateY(0) scale(0.85); opacity:.55; }
    50%{ transform: translateY(-8px) scale(1); opacity:1; }
  }

  @media (prefers-reduced-motion: reduce){
    .paw, .tail, .blossom, .petal{ animation: none !important; }
  }

  .music-btn{
    position:absolute;
    top:16px; right:16px;
    z-index:4;
    width:48px; height:48px;
    border-radius:50%;
    border:none;
    background:var(--card);
    color:var(--ink);
    font-size:1.3rem;
    display:flex; align-items:center; justify-content:center;
    box-shadow:0 8px 18px rgba(43,33,64,0.3);
    cursor:pointer;
    animation: pulse 1.8s ease-in-out infinite;
  }
  .music-btn.playing{ animation:none; }
  @keyframes pulse{
    0%,100%{ transform:scale(1); }
    50%{ transform:scale(1.08); }
  }
  .music-hint{
    position:absolute;
    top:68px; right:16px;
    z-index:4;
    font-size:.75rem;
    color:#fff;
    background:rgba(43,33,64,0.55);
    padding:4px 9px;
    border-radius:10px;
    font-family:'Quicksand',sans-serif;
  }
</style>
</head>
<body>

            <circle cx="108" cy="105" r="5" fill="#ffc17a"/>

        <!-- ===== Cat B: dark-coated, also holding a bouquet ===== -->
        <g transform="translate(330,0) scale(-1,1)">
          <!-- tail -->
          <path class="tail" d="M45 150 C 15 150, 10 110, 35 95" stroke="#2b2632" stroke-width="10" fill="none" stroke-linecap="round"/>
          <!-- body -->
          <ellipse cx="100" cy="150" rx="52" ry="34" fill="#211d27" stroke="#3d3742" stroke-width="1.5"/>
          <!-- head -->
          <circle cx="100" cy="95" r="46" fill="#26212d" stroke="#3d3742" stroke-width="1.5"/>
          <!-- ears -->

          <path d="M100 110 Q100 116 92 116" stroke="#fff3d6" stroke-width="3" fill="none" stroke-linecap="round"/>

          <!-- whiskers -->
          <path d="M60 100 L30 96" stroke="#fff3d6" stroke-width="2" opacity="0.6"/>
          <path d="M60 108 L30 110" stroke="#fff3d6" stroke-width="2" opacity="0.6"/>
          <path d="M140 100 L170 96" stroke="#fff3d6" stroke-width="2" opacity="0.6"/>
          <path d="M140 108 L170 110" stroke="#fff3d6" stroke-width="2" opacity="0.6"/>

          <!-- static paw -->
          <ellipse cx="70" cy="168" rx="12" ry="9" fill="#211d27" stroke="#3d3742" stroke-width="1.5"/>

          <!-- tossing paw with its own bouquet -->
          <g class="paw">
            <!-- paper wrap -->

            <path d="M132 150 L140 118" stroke="#e8ddc8" stroke-width="1" opacity="0.6"/>
            <path d="M148 150 L142 118" stroke="#e8ddc8" stroke-width="1" opacity="0.6"/>
            <!-- ribbon -->

            <path d="M140 146 L149 138 L140 141 Z" fill="#c98fb8"/>
            <circle cx="140" cy="144" r="3.4" fill="#b9587a"/>

            <ellipse cx="140" cy="150" rx="13" ry="10" fill="#211d27" stroke="#3d3742" stroke-width="1.5"/>

<script>
  const container = document.getElementById('petals');
  const colors = ['#ff9eb0', '#ffc17a', '#fff3d6', '#c98fb8'];
  const count = 22;
  for(let i=0;i<count;i++){
    const p = document.createElement('div');
    p.className = 'petal';
    const size = 8 + Math.random()*10;
    p.style.width = size+'px';
    p.style.height = size*0.8+'px';
    p.style.left = Math.random()*100+'vw';
    p.style.background = colors[Math.floor(Math.random()*colors.length)];
    p.style.setProperty('--drift', (Math.random()*80-40)+'px');
    p.style.animationDuration = (7+Math.random()*6)+'s';
    p.style.animationDelay = (Math.random()*8)+'s';
    container.appendChild(p);
  }

  // ---- Background music ----
  const btn = document.getElementById('musicBtn');
  const hint = document.getElementById('musicHint');
  const catWrap = document.getElementById('catWrap');
  const songFile = document.getElementById('songFile'); // present only if you added your own mp3

  let audioCtx, isPlaying = false, loopTimer;

  // A gentle looping pentatonic arpeggio, synthesized (no external file needed).
  const notes = [523.25, 587.33, 659.25, 783.99, 880.00, 783.99, 659.25, 587.33]; // C5 D5 E5 G5 A5 G5 E5 D5
  function playSynthLoop(){
    if(!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    if(audioCtx.state === 'suspended') audioCtx.resume();
    let step = 0;
    const noteLength = 0.42;

    function scheduleNote(freq, time){
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.type = 'sine';
      osc.frequency.setValueAtTime(freq, time);
      gain.gain.setValueAtTime(0, time);
      gain.gain.linearRampToValueAtTime(0.12, time + 0.05);
      gain.gain.linearRampToValueAtTime(0, time + noteLength);
      osc.connect(gain).connect(audioCtx.destination);
      osc.start(time);
      osc.stop(time + noteLength + 0.05);
    }

    function tick(){
      const now = audioCtx.currentTime;
      scheduleNote(notes[step % notes.length], now);
      step++;
      loopTimer = setTimeout(tick, noteLength * 1000);
    }
    tick();
  }
  function stopSynthLoop(){
    clearTimeout(loopTimer);
  }

  function setPlaying(playing){
    if(playing === isPlaying) return; // ignore duplicate calls, prevents overlapping playback
    isPlaying = playing;
    btn.classList.toggle('playing', isPlaying);
    btn.textContent = isPlaying ? '⏸' : '🎵';
    hint.style.display = isPlaying ? 'none' : 'block';

    if(songFile){
      stopSynthLoop(); // safety: make sure no stray synth notes are still scheduled
      if(isPlaying){ songFile.currentTime = 0; songFile.play(); }
      else { songFile.pause(); }
    } else {
      if(isPlaying){ playSynthLoop(); } else { stopSynthLoop(); }
    }
  }

  function toggleMusic(){
    setPlaying(!isPlaying);
  }

  function burstPetals(){
    const extra = 10;
    for(let i=0;i<extra;i++){
      const p = document.createElement('div');
      p.className = 'petal';
      const size = 8 + Math.random()*10;
      p.style.width = size+'px';
      p.style.height = size*0.8+'px';
      p.style.left = (45 + Math.random()*10)+'vw';
      p.style.top = '30vh';
      p.style.background = colors[Math.floor(Math.random()*colors.length)];
      p.style.setProperty('--drift', (Math.random()*160-80)+'px');
      p.style.animationDuration = (2.5+Math.random()*2)+'s';
      p.style.animationDelay = '0s';
      container.appendChild(p);
      setTimeout(() => p.remove(), 5000);
    }
  }

  btn.addEventListener('click', (e) => {
    e.stopPropagation();
    toggleMusic();
  });

  catWrap.addEventListener('click', () => {
    catWrap.classList.remove('celebrate');
    void catWrap.offsetWidth; // restart animation
    catWrap.classList.add('celebrate');
    burstPetals();
    if(!isPlaying) setPlaying(true);
  });

  catWrap.addEventListener('keydown', (e) => {
    if(e.key === 'Enter' || e.key === ' '){
      e.preventDefault();
      catWrap.click();
    }
  });
  catWrap.setAttribute('tabindex', '0');
</script>

</body>
</html>
